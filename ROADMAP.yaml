        estimated_complexity: high
        source_type: manual
        source_ref: ""
        triggered_by: manual
        sla_hours: 72
        imported_at: ""
        description: |
          封裝 headless Chromium 渲染（等待 network idle / 自訂條件，支援 SPA）。
          實作掃描禮儀：遵守 robots、速率限制，且僅允許白名單內網站台（FR-205）。
          白名單於每個出站請求強制（Playwright route 攔截）+ redirect 後最終 URL 與所有子資源主機重新校驗
          + 解析後 IP 黑名單（loopback、link-local 169.254.0.0/16、容器網段、未列白名單 RFC1918）+ 禁 file://；
          資源上限（每頁 navigation timeout、每任務最大頁數、context 記憶體/逾時即 kill、重導/回應大小上限），
          單頁失敗隔離不可拖垮 worker。參考 ADR-002/007/009。
