# ROADMAP.yaml — Accessify Autopilot 任務清單
# 地端、無網際網路（軍網）；穩定優先；強制 i18n（zh-TW + en-US）。
# 使用：.ai_profile 已設 autopilot: enabled。引用 ADR 的任務，該 ADR 須先升 Accepted。
# 由原 SaaS 文件改寫：捨棄多租戶/計費/雲端/對外掃描，聚焦掃描→對應→雙語報表→本地 Portal→地端交付。

version: "1.0"
project: Accessify
last_updated: 2026-06-24

# ═══ 專案元資料 ═══

stack:
  frontend: react
  backend: node
  database: sqlite
  infra: docker

requires:
  uiux: true               # → design_dev + frontend_quality；需 docs/UIUX_SPEC.md
  api: true                # → openapi；需 docs/SDS.md API 段落
  multi_agent: false
  rag: false
  coding_style: true

conventions:
  language: zh-TW           # 程式碼註解語言
  naming: camelCase
  error_handling: exception
  commit_format: conventional
  branch_strategy: github-flow

architecture:
  style: modular-monolith
  api_style: rest
  auth: session            # 本地帳號 + RBAC（ADR-006）
  message_queue: none      # 內嵌佇列（SQLite jobs 表）
  cache: none
  search: none

integrations: []           # 無外部整合（離線場域）

quality:
  test_coverage_target: 80%
  e2e_required: true
  performance_budget: false
  accessibility: WCAG-2.1-AA   # 本產品自身 UI 須通過

security:
  compliance: []           # 地端內網；不適用 SaaS 類合規
  auth_requirements:
    mfa: false
    session_timeout: 30m     # 可由 .env 覆寫
    password_policy: strong

observability:
  logging: structured
  metrics: none
  tracing: none
  alerting: none

documents:
  srs: docs/SRS.md
  sds: docs/SDS.md
  uiux_spec: docs/UIUX_SPEC.md
  deploy_spec: docs/DEPLOY_SPEC.md

